<section id="projects" class="section-gap px-4 bg-surface-dim">
  <div class="container-max">
    <div class="d-flex flex-column mb-5" style="gap: 1rem;">
      <h2 class="text-headline-lg text-white-toggle font-display m-0">Selected Works</h2>
      <div class="bg-primary-container rounded-pill" style="height: 4px; width: 6rem;"></div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-md-4" *ngFor="let project of projects; let i = index">
        <div class="glass-card rounded-lg overflow-hidden position-relative shimmer-effect h-100 d-flex flex-column h-100" style="min-height: 400px; border: 1px solid var(--outline-variant); background: var(--surface-container-low);">
          
          <!-- Abstract visual representation based on index -->
          <div class="position-absolute top-0 w-100 h-100 opacity-20 d-flex align-items-center justify-content-center ptr-events-none" style="z-index: 0;">
             <span class="material-symbols-outlined" style="font-size: 15rem; color: var(--primary);" [ngSwitch]="i">
                <ng-container *ngSwitchCase="0">sailing</ng-container>
                <ng-container *ngSwitchCase="1">flight</ng-container>
                <ng-container *ngSwitchCase="2">vital_signs</ng-container>
                <ng-container *ngSwitchDefault>computer</ng-container>
             </span>
          </div>
          <div class="position-absolute inset-0 w-100 h-100" style="background: linear-gradient(to top, rgba(var(--background-rgb), 0.7), transparent); z-index: 1;"></div>

          <div class="mt-auto p-4 position-relative d-flex flex-column" style="z-index: 2;">
            <span class="text-primary font-display text-label-caps mb-2">{{ project.role }}</span>
            <h3 class="text-headline-lg text-white-toggle font-display mb-3 fs-3">{{ project.title }}</h3>
            <p class="text-on-surface-variant font-display mb-4">{{ project.description }}</p>
            <div class="d-flex flex-wrap gap-2 mb-4">
              <span *ngFor="let t of project.tech" class="badge rounded-pill text-primary border border-primary font-display bg-transparent" style="padding: 0.5rem 1rem;">{{ t }}</span>
            </div>
            <a *ngIf="project.github" [href]="project.github" target="_blank" class="text-white-toggle d-flex align-items-center gap-2 font-display fw-bold transition-all text-decoration-none hover-primary mt-auto">
              View on GitHub <span class="material-symbols-outlined fs-5">code</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
