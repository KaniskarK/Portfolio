<section id="skills" #skillsSection class="section-gap px-4">
  <div class="container-max">
    <div class="row align-items-center gap-gutter">
      <div class="col-md-5">
        <h2 class="text-headline-lg text-white-toggle font-display mb-4">Technical Mastery</h2>
        <p class="text-on-surface-variant font-display text-body-lg mb-5">
          My expertise lies at the intersection of architecture, performance, and modern development frameworks. I specialize in scaling .NET and Angular ecosystems.
        </p>
        
        <div class="d-flex flex-column gap-4">
          <!-- Top skill highlights -->
          <div class="d-flex flex-column gap-2" *ngFor="let skill of topSkills">
            <div class="d-flex justify-content-between align-items-end">
              <span class="fw-bold text-white-toggle font-display">{{ skill.name }}</span>
              <span class="text-primary font-display">{{ skill.current }}%</span>
            </div>
            <div class="w-100 bg-surface-container-high rounded-pill overflow-hidden" style="height: 0.5rem;">
              <div class="h-100 bg-primary progress-bar-animated" 
                [style.width.%]="isVisible ? skill.value : 0" 
                style="background: linear-gradient(to right, var(--primary-container), var(--primary)); transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);"></div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-md-6 offset-md-1 mt-5 mt-md-0">
        <div class="row g-4">
          <div class="col-12 col-sm-6" *ngFor="let cat of skills">
            <div class="glass-card p-4 rounded-lg h-100 transition-all hover-glow border-outline-variant hover-border-primary">
              <h4 class="text-primary font-display mb-3 fs-5">{{ cat.category }}</h4>
              <ul class="text-white-toggle font-display list-unstyled m-0 d-flex flex-column gap-2">
                <li *ngFor="let item of cat.items" class="d-flex align-items-center gap-2">
                  <ng-container *ngIf="item.icon">
                    <!-- URL Icon -->
                    <img *ngIf="item.icon.startsWith('http') || item.icon.startsWith('data:') || item.icon.startsWith('/')" [src]="item.icon" [alt]="item.name" style="width: 1.2rem; height: 1.2rem; object-fit: contain;">
                    
                    <!-- Font Icon (Devicon/PrimeIcon) -->
                    <i *ngIf="!item.icon.startsWith('http') && !item.icon.startsWith('data:') && !item.icon.startsWith('/') && !item.icon.includes(':')" [class]="item.icon" style="font-size: 1.2rem;"></i>
                    
                    <!-- Material Symbol (class:content) -->
                    <span *ngIf="item.icon.includes(':') && !item.icon.startsWith('http') && !item.icon.startsWith('data:')" [class]="item.icon.split(':')[0]" style="font-size: 1.2rem;">
                      {{ item.icon.split(':')[1] }}
                    </span>
                  </ng-container>
                  <span *ngIf="!item.icon" class="material-symbols-outlined text-primary-container" style="font-size: 1rem;">check_circle</span>
                  {{ item.name }}
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
