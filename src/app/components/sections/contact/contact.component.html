<section id="contact" class="section-gap px-4 position-relative">
  <div class="container-max glass-card rounded-xl p-4 p-md-5 text-center position-relative overflow-hidden" style="max-width: 900px;">
    <div class="position-absolute bg-primary-container rounded-pill blur-80" style="top: -6rem; right: -6rem; width: 16rem; height: 16rem; opacity: 0.1;"></div>
    <div class="position-absolute bg-primary-container rounded-pill blur-80" style="bottom: -6rem; left: -6rem; width: 16rem; height: 16rem; opacity: 0.1;"></div>
    
    <h2 class="font-display text-headline-lg text-white-toggle mb-4 position-relative z-1">Ready to Build Something Incredible?</h2>
    <p class="text-on-surface-variant font-display text-body-lg mb-5 mx-auto position-relative z-1" style="max-width: 600px;">
      I am currently available for new opportunities. Let's discuss how we can build high-performance systems and migrate your architecture.
    </p>
    
    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 position-relative z-1">
      <a [href]="'mailto:' + email" class="btn bg-primary-container text-on-primary-container rounded-pill font-display text-headline-md electric-glow-strong d-flex align-items-center justify-content-center transition-all" style="padding: 1rem 2.5rem; gap: 0.5rem; border: none;">
        Send an Email
        <span class="material-symbols-outlined">mail</span>
      </a>
      <a [href]="'tel:' + phone" class="btn border-outline-variant text-white-toggle rounded-pill font-display text-headline-md d-flex align-items-center justify-content-center transition-all hover-white-5 bg-transparent" style="padding: 1rem 2.5rem; gap: 0.5rem;">
        Call Me
        <span class="material-symbols-outlined">call</span>
      </a>
    </div>
  </div>
</section>
