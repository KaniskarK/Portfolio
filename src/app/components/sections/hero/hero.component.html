<section class="position-relative d-flex flex-column align-items-center justify-content-center overflow-hidden w-100" style="min-height: 100vh; padding-top: 8rem; padding-bottom: 6rem;">
  <div class="position-absolute w-100 h-100 top-0 start-50 translate-middle-x bg-transparent" style="z-index: 0; opacity: 0.2; pointer-events: none;">
    <!-- Glowing Orbs (with antigravity) -->
    <div [@antigravity] class="position-absolute bg-primary-container rounded-pill blur-120" style="top: 25%; left: 25%; width: 24rem; height: 24rem;"></div>
    <div [@antigravity] class="position-absolute rounded-pill blur-120" style="bottom: 25%; right: 25%; width: 24rem; height: 24rem; background-color: var(--on-primary-fixed-variant);"></div>
  </div>

  <div class="container-max w-100 px-4 position-relative" style="z-index: 1;">
    <div class="row align-items-center gap-gutter">
      <div class="col-md-7 d-flex flex-column gap-element">
        <span class="text-primary font-display text-label-caps tracking-wide">{{ role }}</span>
        <h1 class="text-white-toggle font-display text-display lh-sm mb-4">
          Building the <span class="text-primary-container">{{ displayText }}</span><span class="typing-cursor">|</span> &amp; Beyond
        </h1>
        <p class="text-on-surface-variant font-display text-body-lg mb-5" style="max-width: 600px;">
          {{ summary }}
        </p>
        <div class="d-flex flex-wrap gap-3">
          <button (click)="scrollTo('projects')" class="btn bg-primary-container text-on-primary-container rounded-pill text-headline-md border-0 electric-glow-strong d-flex align-items-center transition-all" style="padding: 1rem 2.5rem; gap: 0.5rem;">
            View Projects
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
          <button (click)="scrollTo('contact')" class="btn border-outline-variant text-white-toggle rounded-pill text-headline-md bg-transparent hover:border-primary transition-all" style="padding: 1rem 2.5rem;">
            Contact Me
          </button>
        </div>
      </div>

      <div class="col-md-4 offset-md-1 position-relative mt-5 mt-md-0">
        <div [@antigravity]="{ value: '*', params: { time: '8s' } }" class="glass-card p-3 overflow-hidden rounded-xl position-relative transition-all hover-scale image-container-glow" style="z-index: 2; cursor: pointer;">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9OCLuh52_Q6PbUlWgAgWps2r76XD9NOxzqRTIyglhOlAi3yotaDvaKGUvocSuh4jgyr0mln_rRjSk0AFRCiCMg7jZwoOw9XzAzGNgMYPqqC2X5VlvfheurjDePbYAeS5QKR3ZZ8B4bVQxaGRobA_n3y4QyKfPbK80f7u6Of2lXzHXVuNst3vA0CslfvlEaZDH0Mdttb8ah6s_LtAhHUENj_xIaDTLUYp_eA4eDgSF4GSAB1kb8oyE_1UUmBU4Cz4mAkCvNBxAoQ" alt="Futuristic Programmer 3D Model" class="w-100 h-auto rounded" style="object-fit: cover;">
          <div class="position-absolute top-0 start-0 w-100 h-100 opacity-40 pointer-events-none" style="background: linear-gradient(to top, var(--background), transparent); pointer-events: none;"></div>
        </div>

        <!-- Decorative floating attributes -->
        <div [@antigravity]="{ value: '*', params: { time: '5s' } }" class="position-absolute glass-card rounded-pill d-flex align-items-center justify-content-center" style="top: -2.5rem; right: -2.5rem; width: 8rem; height: 8rem; border: 1px solid rgba(0, 224, 255, 0.3); z-index: 3;">
          <span class="material-symbols-outlined text-primary-container" style="font-size: 2.5rem; font-variation-settings: 'FILL' 1;">code</span>
        </div>
        
        <div [@antigravity]="{ value: '*', params: { time: '7s' } }" class="position-absolute glass-card rounded-pill d-flex align-items-center justify-content-center" style="bottom: -1.5rem; left: -1.5rem; width: 6rem; height: 6rem; border: 1px solid rgba(0, 224, 255, 0.3); z-index: 3;">
          <span class="material-symbols-outlined text-primary-container" style="font-size: 2rem;">token</span>
        </div>
      </div>
    </div>
  </div>
</section>
