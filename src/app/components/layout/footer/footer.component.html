<footer class="w-100 d-flex flex-column align-items-center px-4 bg-black-toggle position-relative overflow-hidden"
  style="border-top: 1px solid var(--outline-variant); padding-top: 3rem; padding-bottom: 1.5rem; box-shadow: 0 -10px 30px rgba(0,0,0,0.05);">

  <!-- Decorative glowing orbs -->
  <div class="position-absolute rounded-pill blur-120"
    style="top: -8rem; left: 20%; width: 25rem; height: 25rem; background: var(--primary-container); opacity: 0.05; pointer-events: none;">
  </div>
  <div class="position-absolute rounded-pill blur-120"
    style="bottom: -10rem; right: 10%; width: 30rem; height: 30rem; background: var(--primary); opacity: 0.03; pointer-events: none;">
  </div>

  <!-- Left Side Animation: Quantum Gyroscope Core (Hidden on mobile/tablet, active on desktop) -->
  <div class="footer-bg-left footer-decoration">
    <div class="gyro-container">
      <div class="gyro-mesh">
        <!-- High-Tech Axis Grid & Static Guides -->
        <svg class="gyro-axes" viewBox="0 0 100 100">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 2 L 8 5 L 0 8 z" fill="var(--primary-container)" />
            </marker>
            <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--primary)" stop-opacity="1" />
              <stop offset="50%" stop-color="var(--primary)" stop-opacity="0.3" />
              <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.05" />
            </linearGradient>
            <linearGradient id="orbitGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="var(--primary-container)" stop-opacity="1" />
              <stop offset="60%" stop-color="var(--primary-container)" stop-opacity="0.4" />
              <stop offset="100%" stop-color="var(--primary-container)" stop-opacity="0.05" />
            </linearGradient>
            <linearGradient id="orbitGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="var(--primary)" stop-opacity="1" />
              <stop offset="50%" stop-color="var(--primary)" stop-opacity="0.3" />
              <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.05" />
            </linearGradient>
            <linearGradient id="orbitGrad4" x1="100%" y1="100%" x2="0%" y2="0%">
              <stop offset="0%" stop-color="var(--primary-container)" stop-opacity="1" />
              <stop offset="50%" stop-color="var(--primary-container)" stop-opacity="0.3" />
              <stop offset="100%" stop-color="var(--primary-container)" stop-opacity="0.05" />
            </linearGradient>
            <linearGradient id="orbitGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="var(--primary)" stop-opacity="1" />
              <stop offset="50%" stop-color="var(--primary)" stop-opacity="0.3" />
              <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.05" />
            </linearGradient>
          </defs>
          
          <!-- Concentric Radar Rings -->
          <circle cx="50" cy="50" r="48" fill="none" stroke="var(--primary-container)" stroke-width="0.4" stroke-dasharray="1 3" opacity="0.3" />
          <circle cx="50" cy="50" r="30" fill="none" stroke="var(--primary-container)" stroke-width="0.4" stroke-dasharray="1 3" opacity="0.3" />
          
          <!-- Static Guide Ring Outlines -->
          <circle cx="50" cy="50" r="45" fill="none" stroke="var(--primary)" stroke-width="0.4" opacity="0.1" />
          <circle cx="50" cy="50" r="40" fill="none" stroke="var(--primary-container)" stroke-width="0.4" opacity="0.1" />
          <circle cx="50" cy="50" r="35" fill="none" stroke="var(--primary)" stroke-width="0.4" opacity="0.1" />
          <circle cx="50" cy="50" r="30" fill="none" stroke="var(--primary-container)" stroke-width="0.4" opacity="0.1" />
          <circle cx="50" cy="50" r="24" fill="none" stroke="var(--primary)" stroke-width="0.4" opacity="0.1" />
          
          <!-- Twinkling Quantum Sparkles -->
          <circle class="quantum-sparkle sparkle-1" cx="30" cy="40" r="1" fill="#ffffff" />
          <circle class="quantum-sparkle sparkle-2" cx="70" cy="30" r="1.3" fill="var(--primary-container)" />
          <circle class="quantum-sparkle sparkle-3" cx="45" cy="75" r="1.1" fill="var(--primary)" />
          <circle class="quantum-sparkle sparkle-4" cx="65" cy="65" r="0.8" fill="#ffffff" />
          <circle class="quantum-sparkle sparkle-5" cx="25" cy="60" r="1.2" fill="var(--primary-container)" />

          <!-- Z-Axis (Vertical) -->
          <line x1="50" y1="90" x2="50" y2="10" stroke="var(--primary-container)" stroke-width="0.8" opacity="0.5" marker-end="url(#arrow)" />
          
          <!-- X-Axis Diagonal -->
          <line x1="85" y1="15" x2="15" y2="85" stroke="var(--primary-container)" stroke-width="0.8" opacity="0.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
          
          <!-- Y-Axis Diagonal -->
          <line x1="15" y1="15" x2="85" y2="85" stroke="var(--primary-container)" stroke-width="0.8" opacity="0.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
          
          <!-- Horizontal Axis -->
          <line x1="10" y1="50" x2="95" y2="50" stroke="var(--primary-container)" stroke-width="0.8" opacity="0.3" marker-end="url(#arrow)" />
        </svg>

        <!-- Orbit 1 (Radius 45, Outer) -->
        <div class="gyro-ring ring-outer">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="orbit-path" cx="50" cy="50" r="45" fill="none" stroke="url(#orbitGrad1)" stroke-width="1.8" />
            <circle class="comet-head" cx="50" cy="5" r="3.5" fill="var(--primary)" />
          </svg>
        </div>
        
        <!-- Orbit 2 (Radius 40, Mid-Outer) -->
        <div class="gyro-ring ring-mid-outer">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="orbit-path" cx="50" cy="50" r="40" fill="none" stroke="url(#orbitGrad2)" stroke-width="1.8" />
            <circle class="comet-head" cx="50" cy="10" r="3.2" fill="var(--primary-container)" />
          </svg>
        </div>
        
        <!-- Orbit 3 (Radius 35, Mid) -->
        <div class="gyro-ring ring-middle">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="orbit-path" cx="50" cy="50" r="35" fill="none" stroke="url(#orbitGrad3)" stroke-width="1.6" />
            <circle class="comet-head" cx="50" cy="15" r="3" fill="var(--primary)" />
          </svg>
        </div>
        
        <!-- Orbit 4 (Radius 30, Mid-Inner) -->
        <div class="gyro-ring ring-mid-inner">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="orbit-path" cx="50" cy="50" r="30" fill="none" stroke="url(#orbitGrad4)" stroke-width="1.4" />
            <circle class="comet-head" cx="50" cy="20" r="2.8" fill="var(--primary-container)" />
          </svg>
        </div>
        
        <!-- Orbit 5 (Radius 24, Inner) -->
        <div class="gyro-ring ring-inner">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="orbit-path" cx="50" cy="50" r="24" fill="none" stroke="url(#orbitGrad5)" stroke-width="1.2" />
            <circle class="comet-head" cx="50" cy="26" r="2.5" fill="var(--primary)" />
          </svg>
        </div>
        
        <!-- Center Quantum Core -->
        <div class="gyro-core-container">
          <!-- Outer energy shell -->
          <div class="gyro-core-shell"></div>
          <!-- Bright central orb -->
          <div class="gyro-core-center"></div>
        </div>
      </div>
    </div>
  </div>

              <path class="butterfly-antenna" d="M0.1,-1.6 Q0.8,-3.6 1.8,-4" fill="none" stroke="#ffffff" stroke-width="0.2" />

            <circle class="trail-sparkle spark-1" cx="0" cy="0" r="0.6" fill="#ffffff" />

            <circle class="trail-sparkle spark-3" cx="0" cy="0" r="0.3" fill="var(--primary)" />
            <circle class="trail-sparkle spark-4" cx="0" cy="0" r="0.2" fill="#ffffff" />

              <!-- Right Wing System -->

                <path class="wing-vein" d="M1,-0.8 Q3.5,-2.5 5,-1.5 M0.8,-0.2 Q2.5,0.8 2.5,2.4 M0.6,0.2 L1.8,1.2" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.8" />

  <div class="container-max w-100" style="position: relative; z-index: 2;">
    <div class="row g-5">
      <!-- Brand & About -->
      <div class="col-lg-4 col-md-6">
        <p class="text-on-surface-variant font-display mb-4"
          style="font-size: 0.95rem; line-height: 1.7; opacity: 0.8;">
          {{ resume.profile.tagline }}
        </p>
        <div class="d-flex align-items-center" style="gap: 1.5rem;">
          <a class="text-white-toggle opacity-50 hover-opacity-100 transition-all" href="https://github.com/Kaniskark"
            target="_blank" rel="noopener">
            <i class="pi pi-github" style="font-size: 1.5rem;"></i>
          </a>
          <a class="text-white-toggle opacity-50 hover-opacity-100 transition-all" href="https://linkedin.com/in/kaniskark"
            target="_blank" rel="noopener">
            <i class="pi pi-linkedin" style="font-size: 1.5rem;"></i>
          </a>
        </div>
      </div>

      <!-- Quick Skills -->
      <div class="col-lg-5 col-md-6">
        <h4 class="text-white-toggle font-display text-label-caps mb-4">Core Stack</h4>
        <div class="d-flex flex-wrap gap-2">
          <ng-container *ngFor="let cat of resume.skills">
            <span *ngFor="let item of getFooterItems(cat)"
              class="badge rounded-pill border border-outline-variant text-on-surface-variant font-display py-2 px-3 d-flex align-items-center justify-content-center"
              style="font-size: 1.2rem; background: rgba(255,255,255,0.03); width: 2.5rem; height: 2.5rem; padding: 0 !important;" [title]="item.name">
              
              <!-- URL Icon -->
              <img *ngIf="item.icon.startsWith('http') || item.icon.startsWith('data:') || item.icon.startsWith('/')" [src]="item.icon" [alt]="item.name" style="width: 1.5rem; height: 1.5rem; object-fit: contain;">
              
              <!-- Font Icon -->
              <i *ngIf="!item.icon.startsWith('http') && !item.icon.startsWith('data:') && !item.icon.startsWith('/') && !item.icon.includes(':')" [class]="item.icon"></i>
              
              <!-- Material Symbol -->
              <span *ngIf="item.icon.includes(':') && !item.icon.startsWith('http') && !item.icon.startsWith('data:')" [class]="item.icon.split(':')[0]" style="font-size: 1.2rem;">
                {{ item.icon.split(':')[1] }}
              </span>
            </span>
          </ng-container>
        </div>
      </div>

      <!-- Navigation/Top -->
      <div class="col-lg-3 col-md-12 d-flex flex-column align-items-lg-end">
        <h4 class="text-white-toggle font-display text-label-caps mb-4">Navigation</h4>
        <ul class="list-unstyled d-flex flex-column gap-2 text-lg-end">
          <li><a (click)="scrollToTop()"
              class="text-on-surface-variant font-display hover-primary transition-all pointer"
              style="font-size: 0.9rem; cursor: pointer;">Back to Top</a></li>
          <li><a (click)="scrollToSection('projects')"
              class="text-on-surface-variant font-display hover-primary transition-all"
              style="font-size: 0.9rem; cursor: pointer;">Projects</a></li>
          <li><a (click)="scrollToSection('experience')"
              class="text-on-surface-variant font-display hover-primary transition-all"
              style="font-size: 0.9rem; cursor: pointer;">Experience</a></li>
          <li><a (click)="scrollToSection('contact')"
              class="text-on-surface-variant font-display hover-primary transition-all"
              style="font-size: 0.9rem; cursor: pointer;">Contact</a></li>
        </ul>
      </div>
    </div>

    <!-- Divider -->
    <div class="w-100 mt-4 mb-3"
      style="height: 1px; background: linear-gradient(to right, transparent, rgba(var(--surface-rgb, 255, 255, 255), 0.1), transparent);">
    </div>

    <!-- Bottom Footer -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <div class="d-flex align-items-center" style="gap: 0.75rem;">
        <span class="rounded-circle d-inline-block pulse-dot-themed"
          style="width: 8px; height: 8px; background: #00e676; box-shadow: 0 0 10px #00e676; animation: pulse-dot 2s infinite;"></span>
        <span class="text-on-surface-variant font-display" style="font-size: 0.85rem; letter-spacing: 0.05em;">Available
          for new projects</span>
      </div>

      <div class="text-on-surface-variant font-display text-uppercase"
        style="letter-spacing: 0.1em; font-size: 0.75rem; opacity: 0.6;">
        © {{ currentYear }} Kaniskar K — Designed &amp; Developed with 💎
      </div>
    </div>
  </div>
</footer>
