<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Cyan gradient matching the site's accent system -->
    <linearGradient id="iisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0ff" />
      <stop offset="100%" stop-color="#005f6d" />
    </linearGradient>
  </defs>
  <!-- Main globe boundary showing web server connectivity -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#iisGrad)" stroke-width="6" opacity="0.4" />
  <circle cx="64" cy="64" r="56" fill="none" stroke="#00e0ff" stroke-width="6" stroke-dasharray="14 10" />
  
  <!-- Sleek server rack representing hosting infrastructure -->
  <g transform="translate(0, -2)">
    <!-- Server Unit 1 -->
    <rect x="36" y="38" width="56" height="14" rx="3" fill="#161d1f" stroke="url(#iisGrad)" stroke-width="3" />
    <circle cx="46" cy="45" r="3" fill="#00e0ff" />
    <line x1="56" y1="45" x2="82" y2="45" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
    
    <!-- Server Unit 2 -->
    <rect x="36" y="58" width="56" height="14" rx="3" fill="#161d1f" stroke="url(#iisGrad)" stroke-width="3" />
    <circle cx="46" cy="65" r="3" fill="#00e0ff" />
    <line x1="56" y1="65" x2="82" y2="65" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
    
    <!-- Server Unit 3 -->
    <rect x="36" y="78" width="56" height="14" rx="3" fill="#161d1f" stroke="url(#iisGrad)" stroke-width="3" />
    <circle cx="46" cy="85" r="3" fill="#00e0ff" />
    <line x1="56" y1="85" x2="82" y2="85" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
