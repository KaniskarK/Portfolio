<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: matching the deep cyan-dark background of the portfolio -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1516" />
      <stop offset="100%" stop-color="#162123" />
    </linearGradient>
    <!-- Accent Gradient: electric cyan to light cyan -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0ff" />
      <stop offset="100%" stop-color="#baf2ff" />
    </linearGradient>
    <!-- Inner Glow/Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Squircle with stroke -->
  <rect x="24" y="24" width="464" height="464" rx="140" ry="140" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="16" filter="url(#glow)" />
  
  <!-- Stylized single "K" text, extremely crisp and modern using Space Grotesk look -->
  <text x="50%" y="53%" 
        font-family="'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="280" 
        font-weight="700" 
        fill="url(#accentGrad)" 
        text-anchor="middle" 
        dominant-baseline="middle">K</text>
</svg>
